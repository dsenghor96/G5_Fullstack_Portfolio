<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajouter un nouveau projet</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../css-pages/ajouter-projet.css" />
  <link rel="stylesheet" href="../css-pages/form.css" />
</head>

<body class="bg-gray-100 font-sans">
  <header class="bg-white shadow-md flex justify-between items-center px-8 py-4">

    <img src="listes-projets/img/logo.jpeg" alt="Logo du Portfolio" class="h-12 cursor-pointer" />

    <nav class="flex gap-6 text-gray-700 font-medium">
      <a href="lister-projet.html" class="hover:text-blue-600">Liste</a>
      <a href="#" class="text-blue-600 font-semibold">Ajouter</a>
      <a href="contact.html" class="hover:text-blue-600">Contacts</a>
    </nav>

  </header>

  <main>
    <div class="content">
      <div class="btn-back-index">
        <button class="btn-back"><a href="../index.html">🔙Retour à l'accueil</a></button>
      </div>
      <h2>Ajouter un nouveau projet</h2>
      <form id="addProjectForm">

        <label for="projectName">Nom du projet:</label>
        <input type="text" id="projectName" name="projectName" required />

        <label for="projectDescription">Description du projet:</label>
        <textarea id="projectDescription" name="projectDescription" required></textarea>

        <label for="projectTechnologies">Technologie 1 </label>
        <input type="text" id="projectTechnologies" name="projectTechnologies" required />

        <label for="projectTechnologies">Technologie 2 </label>
        <input type="text" id="projectTechnologies" name="projectTechnologies" required />

        <label for="projectTechnologies">Technologie 3 </label>
        <input type="text" id="projectTechnologies" name="projectTechnologies" required />

        <div class="form-group">
          <label for="projectImage">Image du projet:</label>
          <input type="file" id="projectImage" name="projectImage" accept="image/*" />
        </div>

        <div class="btn-sub-res">
          <button type="submit">Ajouter le projet</button>
          <button type="reset">Réinitialiser</button>
        </div>

      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 G4 Fullstack Portfolio</p>
  </footer>
</body>

</html>
