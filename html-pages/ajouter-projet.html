<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajouter un nouveau projet</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../css-pages/ajouter-projet.css" />
  <link rel="stylesheet" href="../css-pages/form.css" />
</head>

<body class="bg-gray-100 font-sans">
  <header class="bg-white shadow-md flex justify-between items-center px-8 py-4">

    <img src="listes-projets/img/logo.jpeg" alt="Logo du Portfolio" class="h-12 cursor-pointer" />

    <nav class="flex gap-6 text-gray-700 font-medium">
      <a href="lister-projet.html" class="hover:text-blue-600">Liste</a>
      <a href="#" class="text-blue-600 font-semibold">Ajouter</a>
      <a href="contact.html" class="hover:text-blue-600">Contacts</a>
    </nav>

  </header>

  <main class="flex justify-center items-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-lg">
      <div class="btn-back-index">
        <button class="btn-back"><a href="../index.html">🔙Retour à l'accueil</a></button>
      </div>
      <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Ajouter un nouveau projet
      </h2>
      <form id="addProjectForm">

        <label for="projectName" class="block text-gray-700 font-medium mb-1">
          Nom du projet:
        </label>
        <input type="text" id="projectName" name="projectName" required
          class="w-full border border-gray-300 rounded-lg p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <label for="projectDescription" class="block text-gray-700 font-medium mb-1">
          Description du projet
        </label>
        <textarea id="projectDescription" name="projectDescription" required
          class="w-full border border-gray-300 rounded-lg p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        <label for="projectTechnologies" class="block text-gray-700 font-medium mb-1">
          Technologie 1:
        </label>
        <input type="text" id="projectName" name="projectName" required
          class="w-full border border-gray-300 rounded-lg p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <label for="projectTechnologies" class="block text-gray-700 font-medium mb-1">
          Technologie 2:
        </label>
        <input type="text" id="projectName" name="projectName" required
          class="w-full border border-gray-300 rounded-lg p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <label for="projectTechnologies" class="block text-gray-700 font-medium mb-1">
          Technologie 3:
        </label>
        <input type="text" id="projectName" name="projectName" required
          class="w-full border border-gray-300 rounded-lg p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <div class="form-group">
          <label for="projectImage" class="block text-gray-700 font-medium mb-1">
            Image du projet:
          </label>
          <input type="text" id="projectName" name="projectName" required
            class="w-full border border-gray-300 rounded-lg p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="flex gap-4 mt-4">
          <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            Ajouter le projet
          </button>
          <button type="reset" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">
            Réinitialiser
          </button>
        </div>

      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 G4 Fullstack Portfolio</p>
  </footer>
</body>

</html>
